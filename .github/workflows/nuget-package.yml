name: NuGet Package
on:
  push:
    branches:
      - main
      - "releases/*"
  workflow_dispatch: {}
  workflow_call: {}
permissions:
  contents: read

jobs:
  build-bridge-libraries:
    strategy:
      fail-fast: false
      matrix:
        os:
          [
            ubuntu-latest,
            ubuntu-arm,
            alpine-latest,
            alpine-arm,
            macos-intel,
            macos-arm,
            windows-latest,
            windows-arm,
          ]
        include:
          - os: ubuntu-latest
            out-file: libtemporalio_sdk_core_c_bridge.so
            out-prefix: linux-x64
            # We use the Python manylinux image for glibc compatibility
            container: quay.io/pypa/manylinux2014_x86_64
          - os: ubuntu-arm
            out-file: libtemporalio_sdk_core_c_bridge.so
            out-prefix: linux-arm64
            runsOn: ubuntu-24.04-arm64-2-core
            # We use the Python manylinux image for glibc compatibility
            container: quay.io/pypa/manylinux2014_aarch64
          - os: alpine-latest
            out-file: libtemporalio_sdk_core_c_bridge.so
            out-prefix: linux-musl-x64
            # Need Alpine container since GH runner doesn't have one
            container: mcr.microsoft.com/dotnet/sdk:10.0-alpine
            runsOn: ubuntu-latest
          - os: alpine-arm
            out-file: libtemporalio_sdk_core_c_bridge.so
            out-prefix: linux-musl-arm64
            # Need Alpine container since GH runner doesn't have one
            container: mcr.microsoft.com/dotnet/sdk:10.0-alpine
            runsOn: ubuntu-24.04-arm64-2-core
          - os: macos-intel
            out-file: libtemporalio_sdk_core_c_bridge.dylib
            out-prefix: osx-x64
            runsOn: macos-15-intel
          - os: macos-arm
            out-file: libtemporalio_sdk_core_c_bridge.dylib
            out-prefix: osx-arm64
            runsOn: macos-14
          - os: windows-latest
            out-file: temporalio_sdk_core_c_bridge.dll
            out-prefix: win-x64
          - os: windows-arm
            out-file: temporalio_sdk_core_c_bridge.dll
            out-prefix: win-arm64
            runsOn: windows-11-arm
    runs-on: ${{ matrix.runsOn || matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - name: Read mise version
        id: mise-version
        shell: bash
        run: |
          version=$(sed -n 's/^min_version = "\([^"]*\)".*/\1/p' mise.toml)
          if [ -z "$version" ]; then
            echo "::error::Could not read min_version from mise.toml"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        if: ${{ !matrix.container }}
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Setup Rust cache
        if: ${{ !matrix.container }}
        # Fixed version due to https://github.com/Swatinem/rust-cache/issues/183#issuecomment-1893979126
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src/Temporalio/Bridge/sdk-core
          key: ${{ matrix.os }}
          cache-bin: false # https://github.com/Swatinem/rust-cache/issues/341

      - name: Run mise install
        if: ${{ !matrix.container }}
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: ${{ steps.mise-version.outputs.version }}

      - name: Set PROTOC
        if: ${{ !matrix.container }}
        shell: bash
        run: printf 'PROTOC=%s\n' "$(mise which protoc)" >> "$GITHUB_ENV"

      - name: Build (non-Docker)
        if: ${{ !matrix.container }}
        run: cargo build --manifest-path src/Temporalio/Bridge/sdk-core/crates/sdk-core-c-bridge/Cargo.toml --profile release-lto

      - name: Build (Docker non-Alpine)
        if: ${{ matrix.container && matrix.os != 'alpine-latest' && matrix.os != 'alpine-arm' }}
        run: |
          # MISE_INSTALL_MUSL forces the static musl mise; its gnu build needs glibc 2.18, newer than manylinux2014's 2.17.
          docker run --rm -v "$(pwd):/workspace" -w /workspace \
            ${{ matrix.container }} \
            sh -c ' \
                curl https://sh.rustup.rs -sSf | sh -s -- --default-toolchain stable -y \
             && . $HOME/.cargo/env \
             && curl https://mise.run | MISE_VERSION=v${{ steps.mise-version.outputs.version }} MISE_INSTALL_MUSL=1 sh \
             && export PATH="$HOME/.local/bin:$PATH" \
             && mise trust /workspace/mise.toml \
             && mise install \
             && export PROTOC="$(mise which protoc)" \
             && cargo build --manifest-path src/Temporalio/Bridge/sdk-core/crates/sdk-core-c-bridge/Cargo.toml --profile release-lto \
            '

      - name: Build (Docker Alpine)
        if: ${{ matrix.container && (matrix.os == 'alpine-latest' || matrix.os == 'alpine-arm') }}
        run: |
          docker run --rm -v "$(pwd):/workspace" -w /workspace \
            ${{ matrix.container }} \
            sh -c ' \
                curl https://sh.rustup.rs -sSf | sh -s -- --default-toolchain stable -y \
             && . $HOME/.cargo/env \
             && apk add --no-cache build-base \
             && curl https://mise.run | MISE_VERSION=v${{ steps.mise-version.outputs.version }} MISE_INSTALL_MUSL=1 sh \
             && export PATH="$HOME/.local/bin:$PATH" \
             && mise trust /workspace/mise.toml \
             && mise install \
             && export PROTOC="$(mise which protoc)" \
             && RUSTFLAGS="-C target-feature=-crt-static" cargo build --manifest-path src/Temporalio/Bridge/sdk-core/crates/sdk-core-c-bridge/Cargo.toml --profile release-lto \
            '

      - name: Upload bridge library
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.out-prefix }}-bridge
          path: src/Temporalio/Bridge/sdk-core/target/release-lto/${{ matrix.out-file }}
          if-no-files-found: error

  build-nuget-package:
    needs:
      - build-bridge-libraries
    runs-on: windows-latest
    env:
      RestoreLockedMode: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - name: Download bridge libraries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: bridge-libraries

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          global-json-file: global.json

      - name: Build package
        run: dotnet pack -c Release /p:BridgeLibraryRoot=${{ github.workspace }}/bridge-libraries

      - name: Upload NuGet artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: nuget-package
          path: |
            src/Temporalio/bin/Release/*.nupkg
            src/Temporalio/bin/Release/*.snupkg
            src/Temporalio.Extensions.Aws.Lambda/bin/Release/*.nupkg
            src/Temporalio.Extensions.Aws.Lambda/bin/Release/*.snupkg
            src/Temporalio.Extensions.Aws.Lambda.OpenTelemetry/bin/Release/*.nupkg
            src/Temporalio.Extensions.Aws.Lambda.OpenTelemetry/bin/Release/*.snupkg
            src/Temporalio.Extensions.DiagnosticSource/bin/Release/*.nupkg
            src/Temporalio.Extensions.DiagnosticSource/bin/Release/*.snupkg
            src/Temporalio.Extensions.Hosting/bin/Release/*.nupkg
            src/Temporalio.Extensions.Hosting/bin/Release/*.snupkg
            src/Temporalio.Extensions.OpenTelemetry/bin/Release/*.nupkg
            src/Temporalio.Extensions.OpenTelemetry/bin/Release/*.snupkg

  run-smoke-test:
    needs:
      - build-nuget-package
    strategy:
      fail-fast: false
      matrix:
        os:
          [
            ubuntu-latest,
            ubuntu-arm,
            alpine-latest,
            alpine-arm,
            macos-intel,
            macos-arm,
            windows-latest,
            windows-arm,
          ]
        include:
          - os: ubuntu-arm
            runsOn: ubuntu-24.04-arm64-2-core
          - os: alpine-latest
            runsOn: ubuntu-latest
          - os: alpine-arm
            # Run in Docker manually to avoid JS action limitations on ARM64
            runsOn: ubuntu-24.04-arm64-2-core
          - os: macos-intel
            runsOn: macos-15-intel
          - os: macos-arm
            runsOn: macos-14
          - os: windows-arm
            runsOn: windows-11-arm
    runs-on: ${{ matrix.runsOn || matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - name: Download NuGet artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: nuget-package
          path: ${{ github.workspace }}/nuget-package

      - name: Run smoke test
        uses: ./.github/actions/smoke-test
        with:
          # Local folder feed (relative to repo root so it resolves both on the
          # host and inside the Alpine container) plus nuget.org for dependencies.
          package-source: "nuget-package/Temporalio/bin/Release;https://api.nuget.org/v3/index.json"
          is-alpine: ${{ contains(matrix.os, 'alpine') }}
          run-dotnet-framework: ${{ matrix.os == 'windows-latest' }}
